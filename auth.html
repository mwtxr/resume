<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vercel-black: #171717;
            --vercel-white: #ffffff;
            --gray-600: #4d4d4d;
            --gray-400: #808080;
            --gray-100: #ebebeb;
            --gray-50: #fafafa;
            --focus-blue: hsla(212, 100%, 48%, 1);
            --link-blue: #0072f5;
            --shadow-border: 0px 0px 0px 1px rgba(0, 0, 0, 0.08);
            --shadow-card: 0px 0px 0px 1px rgba(0, 0, 0, 0.08), 0px 2px 2px rgba(0, 0, 0, 0.04), 0px 0px 0px 1px #fafafa;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--vercel-white);
            color: var(--vercel-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.96px;
            color: var(--vercel-black);
        }

        .logo p {
            font-size: 14px;
            color: var(--gray-400);
            margin-top: 8px;
        }

        .card {
            background: var(--vercel-white);
            box-shadow: var(--shadow-card);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .tabs {
            display: flex;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--gray-100);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-400);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .tab:hover {
            color: var(--vercel-black);
        }

        .tab.active {
            color: var(--vercel-black);
            border-bottom-color: var(--vercel-black);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--vercel-black);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            color: var(--vercel-black);
            background: var(--vercel-white);
            border: none;
            box-shadow: var(--shadow-border);
            border-radius: 6px;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .form-group input::placeholder {
            color: var(--gray-400);
        }

        .form-group input:focus {
            box-shadow: var(--shadow-border), 0px 0px 0px 2px var(--focus-blue);
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--vercel-black);
            color: var(--vercel-white);
            border: none;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-ghost {
            background: var(--vercel-white);
            color: var(--vercel-black);
            box-shadow: var(--shadow-border);
            border: none;
            margin-top: 12px;
        }

        .btn-ghost:hover {
            background: var(--gray-50);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-100);
        }

        .divider span {
            padding: 0 16px;
            font-size: 12px;
            color: var(--gray-400);
        }

        .oauth-btn {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            background: var(--vercel-white);
            color: var(--vercel-black);
            box-shadow: var(--shadow-border);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .oauth-btn:hover {
            background: var(--gray-50);
        }

        .oauth-btn svg {
            width: 18px;
            height: 18px;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-link a {
            font-size: 13px;
            color: var(--gray-400);
            text-decoration: none;
        }

        .forgot-link a:hover {
            color: var(--vercel-black);
        }

        .terms {
            text-align: center;
            font-size: 12px;
            color: var(--gray-400);
            line-height: 1.6;
        }

        .terms a {
            color: var(--vercel-black);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Form visibility */
        #login-form, #register-form {
            display: none;
        }

        #login-form.active, #register-form.active {
            display: block;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Resume</h1>
            <p>童维猛 · 全栈AI工程师</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="login">登录</button>
                <button class="tab" data-tab="register">注册</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="active">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div class="forgot-link">
                    <a href="#">忘记密码？</a>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
                <button type="button" class="btn btn-ghost">继续使用 GitHub</button>
            </form>

            <!-- Register Form -->
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">姓名</label>
                    <input type="text" id="register-name" placeholder="你的姓名" required>
                </div>
                <div class="form-group">
                    <label for="register-email">邮箱</label>
                    <input type="email" id="register-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="至少 8 个字符" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary">创建账户</button>
            </form>

            <div class="divider">
                <span>或</span>
            </div>

            <button class="oauth-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                使用 GitHub 登录
            </button>

            <button class="oauth-btn">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                使用 Google 登录
            </button>
        </div>

        <p class="terms">
            登录即表示您同意我们的 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
        </p>
    </div>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const tabName = tab.dataset.tab;
                if (tabName === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                } else {
                    loginForm.classList.remove('active');
                    registerForm.classList.add('active');
                }
            });
        });

        // Form submission (demo)
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('登录功能演示 - 实际使用需连接后端');
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('注册功能演示 - 实际使用需连接后端');
        });
    </script>
</body>
</html>
